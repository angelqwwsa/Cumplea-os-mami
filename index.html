<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Pro</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #111, #000);
  color: #00ffcc;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#app {
  width: 340px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 25px #00ffcc;
  text-align: center;
}

input {
  width: 100%;
  height: 50px;
  font-size: 24px;
  text-align: right;
  margin-bottom: 10px;
}

button {
  margin: 3px;
  padding: 10px;
  border-radius: 10px;
  background: black;
  color: #00ffcc;
  border: 1px solid #00ffcc;
}

button:hover {
  background: #00ffcc;
  color: black;
}

#buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
</style>
</head>

<body>

<div id="app">
  <h2>🧮 CALCULADORA PRO</h2>

  <input id="screen" disabled />

  <div id="buttons"></div>
</div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
